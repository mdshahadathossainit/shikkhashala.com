<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শিক্ষাশালা কোচিং সেন্টার | অনলাইন পরীক্ষা</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background: linear-gradient(135deg, #e8f4fc 0%, #d4e9f7 100%);
            min-height: 100vh;
        }

        /* হেডার স্টাইল */
        .header {
            background: linear-gradient(135deg, #0056b3 0%, #004494 100%);
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        /* মূল কন্টেন্ট */
        .main-content {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }

        /* ক্লাস সেকশন */
        .section-title {
            text-align: center;
            color: #0056b3;
            font-size: 24px;
            margin-bottom: 25px;
        }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .class-card {
            background: white;
            padding: 25px 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid transparent;
        }

        .class-card:hover {
            transform: translateY(-5px);
            border-color: #0056b3;
            box-shadow: 0 8px 25px rgba(0,86,179,0.25);
        }

        .class-card h3 {
            color: #0056b3;
            font-size: 22px;
        }

        .class-card span {
            color: #666;
            font-size: 14px;
        }

        /* সাব্জেক্ট লিস্ট - শুরুতে দেখাবে না */
        #subjectsSection {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .subject-list {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subject-item:last-child {
            border-bottom: none;
        }

        .subject-item:hover {
            background: #f8f9fa;
        }

        .subject-item h4 {
            color: #333;
            font-size: 18px;
        }

        .subject-item .arrow {
            color: #0056b3;
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .subject-item:hover .arrow {
            transform: translateX(5px);
        }

        /* ব্যাক বাটন */
        .back-btn {
            display: inline-block;
            background: #0056b3;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #004494;
        }

        /* ফুটার */
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <!-- হেডার -->
    <div class="header">
        <h1>শিক্ষাশালা কোচিং সেন্টার</h1>
        <p>অনলাইন পরীক্ষা পোর্টাল</p>
    </div>

    <!-- মূন কন্টেন্ট -->
    <div class="main-content">
        
        <!-- ক্লাস সিলেক্ট করার পেজ -->
        <div id="classesSection">
            <h2 class="section-title">📚 আপনার ক্লাস নির্বাচন করুন</h2>
            <div class="classes-grid">
                
                <div class="class-card" onclick="showSubjects('six')">
                    <h3>ষষ্ঠ</h3>
                    <span>Class 6</span>
                </div>

                <div class="class-card" onclick="showSubjects('seven')">
                    <h3>সপ্তম</h3>
                    <span>Class 7</span>
                </div>

                <div class="class-card" onclick="showSubjects('eight')">
                    <h3>অষ্টম</h3>
                    <span>Class 8</span>
                </div>

                <div class="class-card" onclick="showSubjects('nine')">
                    <h3>নবম</h3>
                    <span>Class 9</span>
                </div>

                <div class="class-card" onclick="showSubjects('ten')">
                    <h3>দশম</h3>
                    <span>Class 10</span>
                </div>

                <div class="class-card" onclick="showSubjects('eleven')">
                    <h3>একাদশ</h3>
                    <span>HSC - 1st Year</span>
                </div>

                <div class="class-card" onclick="showSubjects('twelve')">
                    <h3>দ্বাদশ</h3>
                    <span>HSC - 2nd Year</span>
                </div>

            </div>
        </div>

        <!-- সাব্জেক্ট লিস্ট - ক্লাস সিলেক্ট করলে দেখাবে -->
        <div id="subjectsSection">
            <div class="back-btn" onclick="goBack()">← ক্লাসে ফিরে যান</div>
            <h2 class="section-title" id="classTitle">📖 সাব্জেক্ট নির্বাচন করুন</h2>
            <div class="subject-list" id="subjectList">
                <!-- JavaScript দিয়ে সাব্জেক্ট যুক্ত হবে -->
            </div>
        </div>

    </div>

    <!-- ফুটার -->
    <div class="footer">
        &copy; 2024 শিক্ষাশালা কোচিং সেন্টার | সর্বসত্ব সংরক্ষিত
    </div>

    <script>
        // এখানে আপনার ক্লাস ও সাব্জেক্টের তথ্য এবং গুগুল ফর্ম লিংকগুলো যুক্ত করুন
        
        var examData = {
            // ষষ্ঠ শ্রেণী
            'six': {
                className: 'ষষ্ঠ শ্রেণী',
                subjects: [
                    { name: 'বাংলা', link: '#' },  // এখানে '#' এর জায়গায় গুগুল ফর্ম লিংক দিন
                    { name: 'ইংরেজি', link: '#' },
                    { name: 'গণিত', link: '#' },
                    { name: 'বিজ্ঞান', link: '#' },
                    { name: 'সামাজিক বিজ্ঞান', link: '#' }
                ]
            },
            
            // সপ্তম শ্রেণী
            'seven': {
                className: 'সপ্তম শ্রেণী',
                subjects: [
                    { name: 'বাংলা', link: '#' },
                    { name: 'ইংরেজি', link: '#' },
                    { name: 'গণিত', link: '#' },
                    { name: 'বিজ্ঞান', link: '#' },
                    { name: 'সামাজিক বিজ্ঞান', link: '#' }
                ]
            },
            
            // অষ্টম শ্রেণী
            'eight': {
                className: 'অষ্টম শ্রেণী',
                subjects: [
                    { name: 'বাংলা', link: '#' },
                    { name: 'ইংরেজি', link: '#' },
                    { name: 'গণিত', link: '#' },
                    { name: 'বিজ্ঞান', link: '#' },
                    { name: 'সামাজিক বিজ্ঞান', link: '#' }
                ]
            },
            
            // নবম শ্রেণী
            'nine': {
                className: 'নবম শ্রেণী',
                subjects: [
                    { name: 'বাংলা', link: '#' },
                    { name: 'ইংরেজি', link: '#' },
                    { name: 'গণিত', link: '#' },
                    { name: 'বিজ্ঞান', link: '#' },
                    { name: 'সামাজিক বিজ্ঞান', link: '#' }
                ]
            },
            
            // দশম শ্রেণী
            'ten': {
                className: 'দশম শ্রেণী',
                subjects: [
                    { name: 'বাংলা', link: '#' },
                    { name: 'ইংরেজি', link: '#' },
                    { name: 'গণিত', link: '#' },
                    { name: 'বিজ্ঞান', link: '#' },
                    { name: 'সামাজিক বিজ্ঞান', link: '#' }
                ]
            },
            
            // একাদশ শ্রেণী (HSC 1st Year)
            'eleven': {
                className: 'একাদশ শ্রেণী',
                subjects: [
                    { name: 'পদার্থবিজ্ঞান ১ম পত্র', link: '#' },
                    { name: 'রসায়ন ১ম পত্র', link: '#' },
                    { name: 'জীববিজ্ঞান ১ম পত্র', link: '#' },
                    { name: 'গণিত ১ম পত্র', link: '#' },
                    { name: 'ইংরেজি', link: '#' }
                ]
            },
            
            // দ্বাদশ শ্রেণী (HSC 2nd Year)
            'twelve': {
                className: 'দ্বাদশ শ্রেণী',
                subjects: [
                    { name: 'পদার্থবিজ্ঞান ২য় পত্র', link: '#' },
                    { name: 'রসায়ন ২য় পত্র', link: '#' },
                    { name: 'জীববিজ্ঞান ২য় পত্র', link: '#' },
                    { name: 'গণিত ২য় পত্র', link: '#' },
                    { name: 'ইংরেজি', link: '#' }
                ]
            }
        };

        // ক্লাস সিলেক্ট করলে সাব্জেক্ট দেখাবে
        function showSubjects(classId) {
            var data = examData[classId];
            var subjectList = document.getElementById('subjectList');
            var classTitle = document.getElementById('classTitle');
            
            // ক্লাসের নাম সেট করুন
            classTitle.innerHTML = '📖 ' + data.className + ' - সাব্জেক্ট নির্বাচন করুন';
            
            // সাব্জেক্ট লিস্ট তৈরি করুন
            var html = '';
            data.subjects.forEach(function(subject) {
                html += '<div class="subject-item" onclick="openExam(\'' + subject.link + '\')">';
                html += '<h4>' + subject.name + '</h4>';
                html += '<span class="arrow">➜</span>';
                html += '</div>';
            });
            
            subjectList.innerHTML = html;
            
            // সেকশন পরিবর্তন করুন
            document.getElementById('classesSection').style.display = 'none';
            document.getElementById('subjectsSection').style.display = 'block';
        }

        // ব্যাক বাটনে ক্লিক করলে ক্লাস লিস্টে ফিরবে
        function goBack() {
            document.getElementById('classesSection').style.display = 'block';
            document.getElementById('subjectsSection').style.display = 'none';
        }

        // সাব্জেক্টে ক্লিক করলে গুগুল ফর্ম লিংক খুলবে
        function openExam(link) {
            if (link === '#') {
                alert('এই পরীক্ষার লিংক এখনো যুক্ত করা হয়নি!');
            } else {
                window.open(link, '_blank');
            }
        }
    </script>

</body>
</html>
